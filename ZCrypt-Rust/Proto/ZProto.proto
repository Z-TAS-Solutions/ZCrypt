syntax = "proto3";
package zproto;
option go_package = "./api/grpc/zproto/";

service PingService {
  rpc Ping(PingRequest) returns (PingResponse);
}

message PingRequest {
  string message = 1;
}

message PingResponse {
  string reply = 1;
}

service CrypticService {
  rpc FetchDecryptedTemplate(FetchTemplateRequest) returns (FetchTemplateResponse);
}

message FetchTemplateRequest {
  string user_id = 1;
}

message FetchTemplateResponse {
  bool success = 1;
  bytes template_data = 2;
  string error_message = 3;
}
