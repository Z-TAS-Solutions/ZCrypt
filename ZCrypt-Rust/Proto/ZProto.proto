syntax = "proto3";

package zproto;

message ZIPCPacket {
    uint64 request_id = 1;
    oneof message {
      PingRequest ping_request = 2;
      PingResponse ping_response = 3;
      TestPacket test_packet = 4;
    }
}

message PingRequest {
  string message = 1;
}

message PingResponse {
  string reply = 1;
}

message TestPacket {
  uint32 id = 1;
  bytes payload = 2;
  uint64 timestamp = 3;
}

service TestService {
  rpc Ping(PingRequest) returns (PingResponse);
  rpc SendData(TestPacket) returns (PingResponse);
}
